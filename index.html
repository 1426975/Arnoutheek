<script>


// HTML GENERATOR _____________________________________________________________

function renderAlbums(albumsToRender, sortMode) {
  const masterContainer = document.getElementById('masterContainer');
  masterContainer.innerHTML = "";
  let lastGroup = "";

  albumsToRender.forEach(album => {
    let currentGroup = sortMode === 'alphabetical' ? album.artist : album.year; // Base header on sort mode

    if (currentGroup !== lastGroup) { // Inject header when necessary
      const headerDiv = document.createElement('div');
      headerDiv.classList.add('thumbnailContainer', 'headerSquare');
      headerDiv.innerHTML = `<div class="headerSquareText">${currentGroup}</div>`;
      masterContainer.appendChild(headerDiv);
      lastGroup = currentGroup;
    }

    const imageName = album.title // Determine image name based on album title
      .replace(/ /g, '_')
      .replace(/\?/g, '(question_mark)')
      .replace(/:/g, '(colon)');

    const thumbnailContainer = document.createElement('div'); // Set values for thumbnails
    thumbnailContainer.classList.add('thumbnailContainer');
    thumbnailContainer.innerHTML = `
      <img class="thumbnailImage" src="${imageName}_thumb.jpg" alt="${album.title}">
    `;

    const thumbnailImage = thumbnailContainer.querySelector('.thumbnailImage'); // Make thumbnail clickable
    thumbnailImage.onclick = function() {
      if (album.color) {
        albumInfoContainer.style.backgroundColor = `#${album.color}`;
        const r = parseInt(album.color.substring(0, 2), 16);
        const g = parseInt(album.color.substring(2, 4), 16);
        const b = parseInt(album.color.substring(4, 6), 16);
        const brightness = (r + g + b) / 3;
        albumInfoContainer.classList.toggle('dark-bg', brightness < 200);
      } else {
        albumInfoContainer.style.backgroundColor = "white"; 
        albumInfoContainer.classList.remove('dark-bg');
      }
      
// 2. Wait a split millisecond for the layout to load, then instantly snap to the right
setTimeout(function() {
  slider.scrollTo({
    left: 10000,       // A massive number guarantees it goes as far right as possible
    behavior: 'auto'   // 'auto' overrides the smooth CSS so it snaps instantly on open
  });
}, 10); 
      albumImage.src = `${imageName}.jpg`; 
      albumImage.alt = album.title;          
      title.textContent = album.title;       
      artistYear.textContent = `${album.artist} • ${album.year}`; 
      tracklist.innerHTML = "";              

      album.tracks.forEach((track, index) => {
        const li = document.createElement('li');                
        const liked = track.liked ? "&#11044" : "";              
        const linkUrl = track.link ? track.link : "";           
        const targetAttr = track.link ? 'target="_blank"' : ''; 
        const trackNum = index + 1;                             
        li.innerHTML = `                                        
          <a href="${linkUrl}" ${targetAttr} class="track-item-link">
            <div class="track-number">${trackNum}</div>
            <div class="track-title">${track.title}</div>
            <div class="track-duration">${liked} &nbsp;${track.duration}</div>
          </a>
        `;
        if (!track.link) {                                      
          li.querySelector('.track-item-link').onclick = (e) => e.preventDefault();
        }
        tracklist.appendChild(li);                              
      });

      backgroundFade.classList.add('show');         
    };

    masterContainer.appendChild(thumbnailContainer); 
  });
}


// INITIAL SORTING ____________________________________________________________

  }

});
renderAlbums(sortedAlbums, 'chronological');


// HIDING MODALS ______________________________________________________________

window.onclick = function(event) {
  if (event.target === backgroundFade) {
    backgroundFade.classList.remove('show');
  }
  else if (event.target === sortingMenuFade) {
    sortingMenuFade.classList.remove('show');
  }
}


// SORTING BUTTON _____________________________________________________________

const sortingButton = document.getElementById('sortingButton');
const sortingMenuFade = document.getElementById('sortingMenuFade');
const sortingMenu = document.getElementById('sortingMenu');
const alphabeticalSortingButton = document.getElementById('alphabeticalSortingButton');
const chronologicalSortingButton = document.getElementById('chronologicalSortingButton');
sortingButton.onclick = function() {
  sortingMenuFade.classList.add('show'); 
};

alphabeticalSortingButton.onclick = function() {
  sortedAlbums.sort((a, b) => {
    const artistA = a.artist.toLowerCase();
    const artistB = b.artist.toLowerCase();
    if (artistA !== artistB) {
      return artistA.localeCompare(artistB);
    }
    return a.year - b.year; 
  });
  document.getElementById('sortingButtonText').textContent = "AZ";
  document.querySelector('#alphabeticalSortingButton img').src = "circleFull.png";
  document.querySelector('#chronologicalSortingButton img').src = "circleEmpty.png";
  renderAlbums(sortedAlbums, 'alphabetical');
  sortingMenuFade.classList.remove('show');
};

chronologicalSortingButton.onclick = function() {
  sortedAlbums.sort((a, b) => {
    if (a.year !== b.year) {
      return b.year - a.year;
    }
    return a.artist.toLowerCase().localeCompare(b.artist.toLowerCase());
  });
  document.getElementById('sortingButtonText').textContent = "JAAR";
  document.querySelector('#alphabeticalSortingButton img').src = "circleEmpty.png";

  sortingMenuFade.classList.remove('show');
};


// FULL SCREEN BUTTON _________________________________________________________

const fullscreenButton = document.getElementById('fullScreenButton');

fullscreenButton.onclick = function() {
  // Check if the browser is currently in fullscreen mode
  const isFullscreen = document.fullscreenElement || 
                       document.webkitFullscreenElement || 
                       document.mozFullScreenElement || 
                       document.msFullscreenElement;

  if (!isFullscreen) {
    // If not in fullscreen, enter it (targeting the entire page)
    const docElm = document.documentElement;
    if (docElm.requestFullscreen) {
      docElm.requestFullscreen();
    } else if (docElm.webkitRequestFullscreen) { /* iOS / Safari */
      docElm.webkitRequestFullscreen();
    } else if (docElm.mozRequestFullScreen) { /* Firefox */
      docElm.mozRequestFullScreen();
    } else if (docElm.msRequestFullscreen) { /* IE/Edge */
      docElm.msRequestFullscreen();
    }
  } else {
    // If already in fullscreen, exit it
    if (document.exitFullscreen) {
      document.exitFullscreen();
    } else if (document.webkitExitFullscreen) { /* iOS / Safari */
      document.webkitExitFullscreen();
    } else if (document.mozCancelFullScreen) { /* Firefox */
      document.mozCancelFullScreen();
    } else if (document.msExitFullscreen) { /* IE/Edge */
      document.msExitFullscreen();
    }
  }
};


// HEADER _____________________________________________________________________

const topMenu = document.querySelector('.topMenu');
let lastScrollY = window.scrollY;
let headerY = 0; // 0 means fully visible, negative means pushed up

window.addEventListener('scroll', () => {
  const currentScrollY = window.scrollY;
  const headerHeight = topMenu.offsetHeight;
  
  // Calculate exactly how many pixels the user just scrolled
  const deltaY = currentScrollY - lastScrollY;

  // Ignore iOS elastic "bounce" scrolling at the very top
  if (currentScrollY < 0) return;

  // Move the header by the exact same amount the user scrolled
  headerY -= deltaY;

  // Clamp the math so it doesn't push too far up or pull too far down
  if (headerY < -headerHeight) {
    headerY = -headerHeight; // Cap it exactly at its own height (fully hidden)
  } else if (headerY > 0) {
    headerY = 0; // Cap it at 0 (fully visible)
  }

  // Instantly apply the movement
  topMenu.style.transform = `translateY(${headerY}px)`;

  // Save the current scroll position for the next frame
  lastScrollY = currentScrollY;
}, { passive: true }); // passive: true ensures the scrolling stays buttery smooth

</script>
